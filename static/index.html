<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 NCAA March Madness Dashboard</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
      --text: #e6edf3; --muted: #7d8590; --green: #3fb950; --red: #f85149;
      --yellow: #d29922; --blue: #58a6ff; --purple: #bc8cff; --orange: #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

    /* Header */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 17px; font-weight: 700; }
    header h1 span { color: var(--blue); }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .live-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .dot.stale { background: var(--yellow); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    button.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    button.btn:hover { background: var(--border); }

    /* Layout */
    .container { max-width: 1500px; margin: 0 auto; padding: 16px 20px; }

    /* Alerts */
    .alert-bar { margin-bottom: 12px; }
    .alert { display: flex; gap: 8px; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
    .alert-HIGH { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); }
    .alert-MEDIUM { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.3); }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab { background: none; border: none; color: var(--muted); padding: 8px 14px; cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .pane { display: none; }
    .pane.active { display: block; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
    .badge-green { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-red { background: rgba(248,81,73,.15); color: var(--red); }
    .badge-blue { background: rgba(88,166,255,.15); color: var(--blue); }

    /* Grid helpers */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    @media(max-width:1100px){ .g4{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:1fr 1fr} }
    @media(max-width:700px){ .g2,.g3,.g4{grid-template-columns:1fr} }

    /* Championship probability cards */
    .champ-card { text-align: center; padding: 14px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); }
    .champ-card.leader { border-color: var(--blue); }
    .champ-team { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
    .champ-seed { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .champ-pct { font-size: 34px; font-weight: 900; color: var(--blue); }
    .champ-sublabel { font-size: 10px; color: var(--muted); }
    .champ-market { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .champ-edge { font-size: 11px; margin-top: 4px; font-weight: 700; }

    /* Bracket region view */
    .region-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
    .region-header { background: var(--surface2); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .region-name { font-size: 13px; font-weight: 800; }
    .region-winner-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: rgba(88,166,255,.15); color: var(--blue); }

    /* Round columns */
    .rounds-grid { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 0; }
    .round-col { border-right: 1px solid var(--border); padding: 10px 10px; }
    .round-col:last-child { border-right: none; }
    .round-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

    /* Game row */
    .game { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px; margin-bottom: 6px; }
    .game.upset { border-color: var(--orange); }
    .game-teams { display: flex; flex-direction: column; gap: 4px; }
    .game-team { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    .game-team.predicted-winner { font-weight: 800; color: var(--text); }
    .game-team.loser { color: var(--muted); text-decoration: line-through; }
    .team-seed-badge { font-size: 10px; color: var(--muted); margin-right: 5px; min-width: 18px; display: inline-block; }
    .team-name-cell { flex: 1; }
    .win-pct { font-size: 11px; color: var(--muted); }
    .win-pct.hot { color: var(--green); }
    .spread-chip { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg); color: var(--muted); margin-top: 3px; }
    .injury-flag { font-size: 10px; color: var(--red); margin-top: 2px; }

    /* Prob bar */
    .prob-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 4px; }
    .prob-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 2px; }

    /* EV cards */
    .ev-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .ev-card.strong { border-left: 3px solid var(--green); }
    .ev-card.moderate { border-left: 3px solid var(--blue); }
    .ev-matchup { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .ev-bet-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .ev-team { font-size: 16px; font-weight: 700; }
    .ev-odds { font-size: 16px; font-weight: 700; }
    .ev-prob-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 6px; }
    .ev-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; text-align: center; }
    .ev-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
    .ev-stat-val { font-size: 14px; font-weight: 700; }
    .ev-injury-note { font-size: 11px; color: var(--yellow); margin-top: 5px; }
    .ev-region { font-size: 11px; color: var(--purple); }
    .ev-badge { padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .ev-strong { background: rgba(63,185,80,.15); color: var(--green); }
    .ev-moderate { background: rgba(88,166,255,.15); color: var(--blue); }
    .green { color: var(--green); font-weight: 700; }
    .red { color: var(--red); font-weight: 700; }
    .bar-green { display: inline-block; height: 5px; border-radius: 2px; background: var(--green); margin-left: 5px; vertical-align: middle; }

    /* Parlay cards */
    .parlay { background: var(--surface2); border: 1px solid var(--green); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .parlay-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .parlay-name { font-weight: 700; font-size: 13px; }
    .parlay-payout { font-size: 20px; font-weight: 900; color: var(--green); }
    .parlay-note { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .parlay-legs { display: flex; flex-direction: column; gap: 3px; }
    .parlay-leg { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 7px; background: var(--surface); border-radius: 3px; }
    .parlay-odds { font-weight: 700; color: var(--orange); }
    .parlay-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; }

    /* Injury rows */
    .inj-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .inj-row:last-child { border-bottom: none; }
    .inj-status { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
    .s-out { background: rgba(248,81,73,.15); color: var(--red); }
    .s-q   { background: rgba(210,153,34,.15); color: var(--yellow); }
    .s-ok  { background: rgba(63,185,80,.15); color: var(--green); }
    .inj-info { flex: 1; }
    .inj-player { font-weight: 700; font-size: 13px; }
    .inj-team { font-size: 11px; color: var(--muted); }
    .inj-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Odds */
    .odds-section { margin-bottom: 16px; }
    .odds-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
    .odds-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 6px; align-items: center; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .odds-row:last-child { border-bottom: none; }
    .odds-row.header { font-size: 11px; color: var(--muted); font-weight: 600; }
    .odds-val { text-align: center; font-weight: 700; padding: 3px 8px; border-radius: 4px; background: var(--surface2); }
    .odds-fav { color: var(--red); }
    .odds-dog { color: var(--green); }

    /* Score */
    .score-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
    .score-status { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .score-team { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
    .score-team.w { font-weight: 800; }
    .score-pts { font-weight: 700; font-size: 15px; }

    /* Misc */
    .loading { display: flex; align-items: center; justify-content: center; padding: 30px; color: var(--muted); }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-data { color: var(--muted); text-align: center; padding: 20px; font-size: 13px; }
    .semi-matchup { background: var(--surface2); border: 1px solid var(--blue); border-radius: 8px; padding: 14px; }
    .semi-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px; }
    .semi-teams { display: flex; align-items: center; gap: 10px; }
    .semi-team { flex: 1; text-align: center; }
    .semi-team-name { font-size: 16px; font-weight: 900; }
    .semi-pct { font-size: 28px; font-weight: 900; }
    .semi-vs { color: var(--muted); font-weight: 900; font-size: 14px; }
    .pbar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin: 8px 0; }
    .pbar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .5s; }

    /* Team colors */
    .c-Arizona  { color: #cc0033; }
    .c-Michigan { color: #ffcb05; }
    .c-Duke     { color: #7ba7d8; }
    .c-Houston  { color: #ff6b6b; }
    .c-Tennessee{ color: #ff8200; }
    .c-Alabama  { color: #9e1b32; }
    .c-Auburn   { color: #e87722; }
    .c-default  { color: var(--text); }

    /* Notable upsets */
    .upset-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .upset-row:last-child { border-bottom: none; }
    .upset-seed { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(255,166,87,.15); color: var(--orange); flex-shrink: 0; }
  </style>
</head>
<body>
<header>
  <h1>2026 NCAA <span>March Madness</span></h1>
  <div class="hdr-right">
    <div class="live-pill">
      <span class="dot" id="live-dot"></span>
      <span id="update-text">Loading...</span>
    </div>
    <button class="btn" onclick="forceRefresh()">↻ Refresh</button>
  </div>
</header>

<div class="container">
  <div id="alert-bar" class="alert-bar"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('bracket')">Full Bracket</button>
    <button class="tab" onclick="switchTab('predictions')">Round Predictions</button>
    <button class="tab" onclick="switchTab('betting')">Betting Lines</button>
    <button class="tab" onclick="switchTab('ev')">+EV Bets</button>
    <button class="tab" onclick="switchTab('parlays')">Parlays</button>
    <button class="tab" onclick="switchTab('injuries')">Injuries</button>
    <button class="tab" onclick="switchTab('scores')">Live Scores</button>
  </div>

  <!-- OVERVIEW -->
  <div id="tab-overview" class="pane active">
    <div id="champ-row" class="g4" style="margin-bottom:14px">
      <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading...</div>
    </div>
    <div class="g2" id="semi-row"></div>
    <div style="margin-top:12px" id="upsets-card"></div>
  </div>

  <!-- FULL BRACKET -->
  <div id="tab-bracket" class="pane">
    <div id="bracket-content"><div class="loading"><div class="spinner"></div>Building bracket...</div></div>
  </div>

  <!-- ROUND PREDICTIONS -->
  <div id="tab-predictions" class="pane">
    <div id="pred-region-tabs" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"></div>
    <div id="pred-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- BETTING LINES -->
  <div id="tab-betting" class="pane">
    <div id="betting-content" class="card"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- +EV BETS -->
  <div id="tab-ev" class="pane">
    <div id="ev-content" class="card"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- PARLAYS -->
  <div id="tab-parlays" class="pane">
    <div id="parlays-content" class="card"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- INJURIES -->
  <div id="tab-injuries" class="pane">
    <div id="injuries-content" class="card"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- LIVE SCORES -->
  <div id="tab-scores" class="pane">
    <div id="scores-content" class="card"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let DS = null;
let bracketSim = null;
let activeRegion = 'East';

const TEAM_COLORS = {
  Arizona: '#cc0033', Michigan: '#ffcb05', Duke: '#7ba7d8', Houston: '#ff6b6b',
  Tennessee: '#ff8200', Alabama: '#9e1b32', Auburn: '#e87722', 'Iowa State': '#c8102e',
};
const teamColor = t => TEAM_COLORS[t] || '#e6edf3';

// ─── Tab ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(`'${name}'`)));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === `tab-${name}`));
  if (name === 'bracket' && bracketSim) renderBracket(bracketSim);
  if (name === 'predictions' && bracketSim) renderPredictions(bracketSim);
}

// ─── Fetch ───────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [stateResp, bracketResp] = await Promise.all([
      fetch('/api/state'), fetch('/api/bracket')
    ]);
    DS = await stateResp.json();
    bracketSim = await bracketResp.json();
    renderAll();
    updateStatusBar();
  } catch(e) {
    document.getElementById('update-text').textContent = 'Connection error';
    document.getElementById('live-dot').className = 'dot stale';
  }
}

async function forceRefresh() {
  await fetch('/api/force-update', {method:'POST'}).catch(()=>{});
  setTimeout(fetchAll, 2500);
}

function updateStatusBar() {
  if (!DS) return;
  const ago = Math.round((Date.now() - new Date(DS.last_updated)) / 1000);
  const stale = ago > 180;
  document.getElementById('live-dot').className = stale ? 'dot stale' : 'dot';
  document.getElementById('update-text').textContent =
    `${stale ? 'Stale' : 'Live'} · ${ago < 60 ? ago+'s' : Math.round(ago/60)+'m'} ago · Update #${DS.update_count}${DS.odds?.is_demo ? ' · DEMO ODDS' : ''}`;
}

// ─── Render All ──────────────────────────────────────────────────────────────
function renderAll() {
  if (!DS) return;
  renderAlerts(DS.alerts || []);
  renderOverview(DS.probabilities || {}, bracketSim || {});
  renderBetting(DS.odds || {});
  renderEV(DS.ev_opportunities || []);
  renderParlays(DS.parlays || []);
  renderInjuries(DS.injuries || []);
  renderScores(DS.scores || {});
}

// ─── Alerts ──────────────────────────────────────────────────────────────────
function renderAlerts(alerts) {
  const el = document.getElementById('alert-bar');
  el.innerHTML = alerts.slice(0,4).map(a => `
    <div class="alert alert-${a.severity}">
      <span>${a.type==='EV'?'💰':a.type==='INJURY'?'🏥':'⚡'}</span>
      <span>${a.message}</span>
    </div>`).join('');
}

// ─── Overview ────────────────────────────────────────────────────────────────
function renderOverview(probs, sim) {
  const ff = sim.final_four || {};
  const s1 = ff.Semifinal_1 || {};
  const s2 = ff.Semifinal_2 || {};

  // Championship probability cards — all 4 FF teams
  const ffTeams = [s1.team_a, s1.team_b, s2.team_a, s2.team_b].filter(Boolean);
  const marketOdds = { Arizona: -150, Michigan: 650, Duke: 200, Houston: 380 };
  const maxProb = Math.max(...ffTeams.map(t => probs[t] || 0));

  document.getElementById('champ-row').innerHTML = ffTeams
    .sort((a,b) => (probs[b]||0) - (probs[a]||0))
    .map(t => {
      const p = probs[t] || 0;
      const mo = marketOdds[t] || 0;
      const impliedP = mo > 0 ? 100/(mo+100) : Math.abs(mo)/(Math.abs(mo)+100);
      const edge = p - impliedP;
      const teamData = getTeamFromSim(sim, t);
      return `<div class="champ-card ${p===maxProb?'leader':''}">
        <div class="champ-team" style="color:${teamColor(t)}">${t}</div>
        <div class="champ-seed">#${teamData?.seed||'?'} ${teamData?.region||''}</div>
        <div class="champ-pct">${(p*100).toFixed(1)}%</div>
        <div class="champ-sublabel">championship probability</div>
        <div class="champ-market">Market: ${mo>0?'+':''}${mo}</div>
        <div class="champ-edge" style="color:${edge>0?'var(--green)':'var(--red)'}">
          ${edge>0?'▲ +':'▼ '}${(edge*100).toFixed(1)}% edge
        </div>
      </div>`;
    }).join('');

  // Semifinal cards
  document.getElementById('semi-row').innerHTML = [
    {label:'Semifinal 1 · April 5', game: s1},
    {label:'Semifinal 2 · April 5', game: s2},
  ].map(({label, game}) => {
    if (!game.team_a) return '<div class="card"><div class="no-data">Loading...</div></div>';
    const pa = (game.win_prob_a*100).toFixed(1);
    const pb = (game.win_prob_b*100).toFixed(1);
    const fav = game.win_prob_a > 0.5 ? game.team_a : game.team_b;
    const spread = game.projected_spread;
    return `<div class="semi-matchup">
      <div class="semi-title">${label} · ${game.team_a} vs ${game.team_b}</div>
      <div class="pbar"><div class="pbar-fill" style="width:${pa}%"></div></div>
      <div class="semi-teams">
        <div class="semi-team">
          <div class="semi-team-name" style="color:${teamColor(game.team_a)}">${game.team_a}</div>
          <div style="font-size:11px;color:var(--muted)">#${game.seed_a}</div>
          <div class="semi-pct" style="color:${game.win_prob_a>0.5?'var(--blue)':'var(--muted)'}">${pa}%</div>
        </div>
        <div class="semi-vs">vs</div>
        <div class="semi-team">
          <div class="semi-team-name" style="color:${teamColor(game.team_b)}">${game.team_b}</div>
          <div style="font-size:11px;color:var(--muted)">#${game.seed_b}</div>
          <div class="semi-pct" style="color:${game.win_prob_b>0.5?'var(--blue)':'var(--muted)'}">${pb}%</div>
        </div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px">
        Proj. spread: <strong style="color:var(--text)">${fav} ${spread > 0 ? '-' : '+'}${Math.abs(spread).toFixed(1)}</strong>
      </div>
    </div>`;
  }).join('');

  // Notable upsets card
  fetch('/api/bracket/predicted-path').then(r=>r.json()).then(d => {
    const upsets = d.notable_upsets || [];
    document.getElementById('upsets-card').innerHTML = `
      <div class="card">
        <div class="card-title">Key Predicted Upsets <span class="badge badge-red">${upsets.length} alerts</span></div>
        ${upsets.map(u => `
          <div class="upset-row">
            <span class="upset-seed">${u.seed_line}</span>
            <div><strong>${u.upset}</strong><br><span style="font-size:12px;color:var(--muted)">${u.reason}</span></div>
          </div>`).join('')}
      </div>`;
  });
}

function getTeamFromSim(sim, teamName) {
  for (const region of Object.keys(sim.regions || {})) {
    for (const game of (sim.regions[region]?.rounds?.R64 || [])) {
      if (game.team_a === teamName) return {seed: game.seed_a, region};
      if (game.team_b === teamName) return {seed: game.seed_b, region};
    }
  }
  return null;
}

// ─── Full Bracket ────────────────────────────────────────────────────────────
function renderBracket(sim) {
  if (!sim.regions) return;
  const regions = Object.keys(sim.regions);
  let html = '';

  for (const region of regions) {
    const rsim = sim.regions[region];
    const winner = rsim.predicted_champion || '?';
    html += `<div class="region-block">
      <div class="region-header">
        <span class="region-name">${region} Region</span>
        <span class="region-winner-pill">Predicted: ${winner}</span>
      </div>
      <div class="rounds-grid">
        <div class="round-col">
          <div class="round-label">Round of 64</div>
          ${renderGames(rsim.rounds.R64 || [], 'R64')}
        </div>
        <div class="round-col">
          <div class="round-label">Round of 32</div>
          ${renderGames(rsim.rounds.R32 || [], 'R32')}
        </div>
        <div class="round-col">
          <div class="round-label">Sweet 16</div>
          ${renderGames(rsim.rounds.S16 || [], 'S16')}
        </div>
        <div class="round-col">
          <div class="round-label">Elite 8</div>
          ${renderGames(rsim.rounds.E8 || [], 'E8')}
        </div>
      </div>
    </div>`;
  }

  // Final Four + Championship
  const ff = sim.final_four || {};
  const champ = sim.championship || {};
  html += `<div class="region-block">
    <div class="region-header">
      <span class="region-name">Final Four & Championship</span>
      <span class="region-winner-pill" style="background:rgba(63,185,80,.15);color:var(--green)">Predicted Champion: ${champ.predicted_champion || '?'}</span>
    </div>
    <div class="rounds-grid" style="grid-template-columns: 1fr 1fr 1fr;">
      <div class="round-col"><div class="round-label">Semifinal 1 (Apr 5)</div>${renderGames([ff.Semifinal_1].filter(Boolean), 'FF')}</div>
      <div class="round-col"><div class="round-label">Semifinal 2 (Apr 5)</div>${renderGames([ff.Semifinal_2].filter(Boolean), 'FF')}</div>
      <div class="round-col"><div class="round-label">Championship (Apr 7)</div>${renderGames([champ].filter(g => g && g.team_a), 'CHAMP')}</div>
    </div>
  </div>`;

  document.getElementById('bracket-content').innerHTML = html;
}

function renderGames(games, round) {
  if (!games.length) return '<div style="color:var(--muted);font-size:12px;padding:8px">TBD</div>';
  return games.map(g => {
    if (!g || !g.team_a) return '';
    const isUpset = g.seed_a > g.seed_b && g.predicted_winner === g.team_a;
    const paA = (g.win_prob_a * 100).toFixed(0);
    const paB = (g.win_prob_b * 100).toFixed(0);
    const injA = (g.injuries_a || []).length > 0;
    const injB = (g.injuries_b || []).length > 0;
    return `<div class="game ${isUpset?'upset':''}">
      <div class="game-teams">
        <div class="game-team ${g.predicted_winner===g.team_a?'predicted-winner':'loser'}">
          <span class="team-seed-badge">${g.seed_a}</span>
          <span class="team-name-cell" style="color:${g.predicted_winner===g.team_a?teamColor(g.team_a):'var(--muted)'}">${g.team_a}</span>
          <span class="win-pct ${g.win_prob_a>0.6?'hot':''}">${paA}%</span>
        </div>
        <div class="game-team ${g.predicted_winner===g.team_b?'predicted-winner':'loser'}">
          <span class="team-seed-badge">${g.seed_b}</span>
          <span class="team-name-cell" style="color:${g.predicted_winner===g.team_b?teamColor(g.team_b):'var(--muted)'}">${g.team_b}</span>
          <span class="win-pct ${g.win_prob_b>0.6?'hot':''}">${paB}%</span>
        </div>
      </div>
      <div class="prob-bar"><div class="prob-bar-fill" style="width:${paA}%"></div></div>
      <div class="spread-chip">Proj: ${g.projected_spread > 0 ? g.team_b+' -'+Math.abs(g.projected_spread).toFixed(1) : g.team_a+' -'+Math.abs(g.projected_spread).toFixed(1)}</div>
      ${injA ? `<div class="injury-flag">⚠ ${g.team_a} injury</div>` : ''}
      ${injB ? `<div class="injury-flag">⚠ ${g.team_b} injury</div>` : ''}
    </div>`;
  }).join('');
}

// ─── Round Predictions (by region) ──────────────────────────────────────────
function renderPredictions(sim) {
  const regions = ['East', 'South', 'West', 'Midwest', 'Final Four'];
  const tabBar = document.getElementById('pred-region-tabs');
  tabBar.innerHTML = regions.map(r => `
    <button class="btn ${r===activeRegion?'active':''}" style="${r===activeRegion?'border-color:var(--blue);color:var(--blue)':''}" onclick="setActiveRegion('${r}')">${r}</button>
  `).join('');
  renderPredRegion(activeRegion, sim);
}

function setActiveRegion(region) {
  activeRegion = region;
  if (bracketSim) renderPredictions(bracketSim);
}

function renderPredRegion(region, sim) {
  const el = document.getElementById('pred-content');
  if (region === 'Final Four') {
    const ff = sim.final_four || {};
    const ch = sim.championship || {};
    el.innerHTML = `
      <div class="card"><div class="card-title">Final Four — San Antonio, TX · April 4-7</div>
        <div class="g3">
          ${renderPredGameCard(ff.Semifinal_1, 'Semifinal 1 · Apr 5')}
          ${renderPredGameCard(ff.Semifinal_2, 'Semifinal 2 · Apr 5')}
          ${renderPredGameCard(ch, 'Championship · Apr 7')}
        </div>
      </div>`;
    return;
  }

  const rsim = sim.regions?.[region];
  if (!rsim) { el.innerHTML = '<div class="no-data">Region data not available.</div>'; return; }

  const roundNames = {R64:'Round of 64', R32:'Round of 32', S16:'Sweet 16', E8:'Elite Eight'};
  let html = `<div class="card"><div class="card-title">${region} Region · Predicted Winner: <span style="color:${teamColor(rsim.predicted_champion)}">${rsim.predicted_champion}</span></div>`;
  for (const [rkey, rname] of Object.entries(roundNames)) {
    const games = rsim.rounds?.[rkey] || [];
    if (!games.length) continue;
    html += `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)">${rname}</div>
      <div class="g${Math.min(games.length, 4) >= 4 ? '4' : games.length >= 2 ? '2' : '1'}">
        ${games.map(g => renderPredGameCard(g, null)).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderPredGameCard(g, label) {
  if (!g || !g.team_a) return '<div class="card" style="background:var(--surface2)"><div class="no-data">TBD</div></div>';
  const paA = (g.win_prob_a * 100).toFixed(1);
  const paB = (g.win_prob_b * 100).toFixed(1);
  const fav = g.win_prob_a > 0.5 ? g.team_a : g.team_b;
  const spread = g.projected_spread;
  const spreadStr = `${fav} ${spread > 0 ? '-' : '+'}${Math.abs(spread).toFixed(1)}`;
  return `<div class="card" style="background:var(--surface2);padding:12px">
    ${label ? `<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${label}</div>` : ''}
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:800;font-size:14px;color:${g.predicted_winner===g.team_a?teamColor(g.team_a):'var(--muted)'}">${g.team_a}</span>
        <span style="font-size:16px;font-weight:900;color:${g.win_prob_a>0.5?'var(--blue)':'var(--muted)'}">${paA}%</span>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${paA}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-weight:800;font-size:14px;color:${g.predicted_winner===g.team_b?teamColor(g.team_b):'var(--muted)'}">${g.team_b}</span>
        <span style="font-size:16px;font-weight:900;color:${g.win_prob_b>0.5?'var(--blue)':'var(--muted)'}">${paB}%</span>
      </div>
    </div>
    <div style="font-size:11px;color:var(--muted)">Spread: <strong style="color:var(--text)">${spreadStr}</strong></div>
    <div style="font-size:11px;color:var(--blue);margin-top:3px">→ ${g.predicted_winner}</div>
  </div>`;
}

// ─── Betting Lines ───────────────────────────────────────────────────────────
function renderBetting(odds) {
  const el = document.getElementById('betting-content');
  el.innerHTML = `
    <div class="card-title">Betting Lines <span class="badge ${odds.is_demo?'badge-yellow':'badge-green'}">${odds.is_demo?'DEMO':'LIVE'}</span></div>
    ${(odds.events||[]).map(e => {
      const best = e.best_lines || {};
      const h2h = best.h2h || {};
      const spread = best.spread || {};
      const total = best.total || {};
      return `<div class="odds-section">
        <div class="odds-title">${e.home} vs ${e.away}${e.championship?' · Championship':''}
          ${e.note?`<span style="font-size:11px;color:var(--muted);font-weight:400"> — ${e.note}</span>`:''}
        </div>
        <div class="odds-row header"><span>Team</span><span style="text-align:center">Moneyline</span><span style="text-align:center">Spread</span><span style="text-align:center">Total O/U</span></div>
        ${[e.home, e.away].filter(t=>t!=='TBD').map(t => {
          const ml = h2h[t]; const sp = spread[t];
          return `<div class="odds-row">
            <span style="font-weight:700;color:${teamColor(t)}">${t}</span>
            <span class="odds-val ${ml<0?'odds-fav':'odds-dog'}">${ml!==undefined?(ml>0?'+':'')+ml:'—'}</span>
            <span class="odds-val">${sp!==undefined?(sp>0?'+':'')+sp:'—'}</span>
            <span class="odds-val">${total.line?'O/U '+total.line:'—'}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Updated: ${new Date(odds.updated_at||Date.now()).toLocaleTimeString()}. Set ODDS_API_KEY env var for live lines.</div>`;
}

// ─── +EV ─────────────────────────────────────────────────────────────────────
function renderEV(opps) {
  const el = document.getElementById('ev-content');
  if (!opps.length) {
    el.innerHTML = `<div class="card-title">+EV Bet Finder</div>
      <div class="no-data">No +EV bets detected against seed-based market lines.<br>
      Only Round of 64 games (confirmed matchups) are evaluated.</div>`;
    return;
  }
  el.innerHTML = `
    <div class="card-title">
      +EV Bets — Round of 64 Only (Confirmed Games)
      <span class="badge badge-red">${opps.length} found</span>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
      Market lines use standard seed-based opening lines (DK/FD typical). Model incorporates full injury adjustments and research overlays.
      Only confirmed R64 matchups are shown — no future-round speculation.
    </div>
    ${opps.map(o => `
      <div class="ev-card ${o.rating === 'STRONG' ? 'strong' : 'moderate'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div class="ev-matchup">${o.region} Region · Round of 64</div>
            <div class="ev-matchup" style="color:var(--text);font-size:12px;letter-spacing:0">${o.matchup}</div>
          </div>
          <span class="ev-badge ${o.rating === 'STRONG' ? 'ev-strong' : 'ev-moderate'}">${o.rating}</span>
        </div>
        <div class="ev-bet-line">
          <span style="font-size:12px;color:var(--muted)">BET:</span>
          <span class="ev-team" style="color:${teamColor(o.team)}">${o.team}</span>
          <span class="ev-odds" style="color:${o.odds > 0 ? 'var(--green)' : 'var(--text)'}">${o.odds > 0 ? '+' : ''}${o.odds}</span>
          <span style="font-size:12px;color:var(--muted)">ML</span>
        </div>
        <div class="ev-prob-row">
          <div class="ev-stat">
            <div class="ev-stat-label">Model Prob</div>
            <div class="ev-stat-val" style="color:var(--green)">${(o.model_prob*100).toFixed(1)}%</div>
          </div>
          <div class="ev-stat">
            <div class="ev-stat-label">Market Impl</div>
            <div class="ev-stat-val" style="color:var(--red)">${(o.implied_prob*100).toFixed(1)}%</div>
          </div>
          <div class="ev-stat">
            <div class="ev-stat-label">Edge</div>
            <div class="ev-stat-val" style="color:var(--green)">+${(o.edge*100).toFixed(1)}%</div>
          </div>
          <div class="ev-stat">
            <div class="ev-stat-label">EV / $1</div>
            <div class="ev-stat-val" style="color:var(--green)">+$${o.ev_per_dollar.toFixed(3)}</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--muted)">
          <span>Kelly: <strong style="color:var(--text)">${o.kelly_pct.toFixed(1)}%</strong> (use ¼ Kelly)</span>
          <span>Eff EM: <strong style="color:var(--text)">${o.effective_em > 0 ? '+' : ''}${o.effective_em}</strong></span>
          <span>Proj Spread: <strong style="color:var(--text)">${o.projected_spread > 0 ? '+' : ''}${o.projected_spread}</strong></span>
        </div>
        ${o.injury_note ? `<div class="ev-injury-note">⚠ Injury factor: ${o.injury_note}</div>` : ''}
      </div>
    `).join('')}
    <div style="margin-top:8px;font-size:11px;color:var(--muted)">
      ⚠ Use ¼ Kelly sizing. Market lines are seed-based estimates — configure ODDS_API_KEY for live book lines.
      EV = (model_prob × profit) − (1 − model_prob). Edge = model_prob − market_implied.
    </div>`;
}

// ─── Parlays ─────────────────────────────────────────────────────────────────
function renderParlays(parlays) {
  const el = document.getElementById('parlays-content');
  el.innerHTML = `
    <div class="card-title">Suggested Parlays (Positive EV) <span class="badge badge-green">${parlays.length}</span></div>
    ${!parlays.length ? '<div class="no-data">No positive-EV parlays with current lines.</div>' : ''}
    ${parlays.map(p => `
      <div class="parlay">
        <div class="parlay-hdr">
          <span class="parlay-name">${p.name}</span>
          <span class="parlay-payout">+$${p.payout_on_100.toFixed(0)} / $100</span>
        </div>
        <div class="parlay-note">${p.rationale||''}</div>
        <div class="parlay-legs">
          ${(p.legs||[]).map(l => `
            <div class="parlay-leg">
              <span>${l.label}</span>
              <span class="parlay-odds">${l.odds>0?'+':''}${l.odds} · ${(l.win_prob*100).toFixed(1)}%</span>
            </div>`).join('')}
        </div>
        <div class="parlay-meta">
          <span><span style="color:var(--muted)">Hit Prob:</span> <strong>${(p.combined_prob*100).toFixed(1)}%</strong></span>
          <span><span style="color:var(--muted)">Market:</span> <strong>${(p.implied_prob*100).toFixed(1)}%</strong></span>
          <span><span style="color:var(--muted)">EV/$:</span> <strong class="green">+${p.ev_per_dollar.toFixed(3)}</strong></span>
          <span><span style="color:var(--muted)">Decimal:</span> <strong>${p.combined_decimal.toFixed(2)}x</strong></span>
        </div>
      </div>`).join('')}
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Parlays auto-generated from model vs market lines. Recalculated on every data refresh.</div>`;
}

// ─── Injuries ────────────────────────────────────────────────────────────────
function renderInjuries(injuries) {
  const el = document.getElementById('injuries-content');
  el.innerHTML = `
    <div class="card-title">Injury Report — All Tournament Teams</div>
    ${!injuries.length ? '<div class="no-data">No injury data.</div>' : ''}
    ${injuries.map(i => {
      const s = (i.status||'').toUpperCase();
      const cls = s==='OUT'?'s-out':s==='QUESTIONABLE'?'s-q':'s-ok';
      return `<div class="inj-row">
        <span class="inj-status ${cls}">${s}</span>
        <div class="inj-info">
          <div class="inj-player">${i.player} <span style="color:var(--muted);font-weight:400">(${i.position})</span></div>
          <div class="inj-team" style="color:${teamColor(i.team)}">${i.team}</div>
          <div class="inj-detail">${i.detail||''}</div>
        </div>
        ${i.impact ? `<div style="font-size:12px;font-weight:700;color:${i.impact<0?'var(--red)':'var(--green)'};">${i.impact>0?'+':''}${i.impact}</div>` : ''}
      </div>`;
    }).join('')}`;
}

// ─── Scores ──────────────────────────────────────────────────────────────────
function renderScores(scores) {
  const el = document.getElementById('scores-content');
  const games = scores.games || [];
  el.innerHTML = `
    <div class="card-title">Live Scores & Results
      <span class="badge ${games.some(g=>g.status==='STATUS_IN_PROGRESS')?'badge-green':'badge-blue'}">
        ${games.some(g=>g.status==='STATUS_IN_PROGRESS')?'LIVE':'SCHEDULED'}
      </span>
    </div>
    ${!games.length ? '<div class="no-data">No active tournament games right now. Tournament starts March 19.</div>' : ''}
    ${games.map(g => `
      <div class="score-card">
        <div class="score-status">
          ${g.status==='STATUS_IN_PROGRESS'?`🔴 LIVE · ${g.clock} · Period ${g.period}`:g.status==='STATUS_FINAL'?'FINAL':new Date(g.date||Date.now()).toLocaleString()}
          ${g.venue?' · '+g.venue:''}
        </div>
        <div class="score-team ${g.away_winner?'w':''}">
          <span style="color:${teamColor(g.away)}">${g.away}</span>
          <span class="score-pts">${g.away_score}</span>
        </div>
        <div class="score-team ${g.home_winner?'w':''}">
          <span style="color:${teamColor(g.home)}">${g.home}</span>
          <span class="score-pts">${g.home_score}</span>
        </div>
      </div>`).join('')}`;
}

// ─── Init ────────────────────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, 30000);
</script>
</body>
</html>
